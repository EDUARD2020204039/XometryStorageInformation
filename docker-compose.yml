services:
  xometryanaliza:
    build:
      context: ./XometryAnaliza
    image: xometryanaliza:local
    restart: unless-stopped
    env_file:
      - xometry_bot/.env
    environment:
      PORT: "4468"
      OFERTARE_AUTOMATA_URL: "http://192.168.2.26:8585"
      OFERTARE_AUTOMATA_ROOT: "C:\\Users\\Dorina\\Desktop\\Ofertare-Automata\\XometryAuto"
      OFERTARE_AUTOMATA_CONNECT_TIMEOUT: "10"
      OFERTARE_AUTOMATA_READ_TIMEOUT: "600"
      OFERTARE_AUTOMATA_STALL_TIMEOUT: "420"
      GEO_SFTP_HOST: "192.168.2.26"
      GEO_SFTP_PORT: "22"
      GEO_SFTP_USER: "Dorina"
      GEO_SFTP_KEY_PATH: "/app/data/ssh/id_ed25519"
      SHEET_AGENT_RETRY_SECONDS: "3600"
      TELEGRAM_ENABLED: "true"
      TELEGRAM_SHEET_START_LOGS: "false"
      TELEGRAM_SHEET_FAILURE_LOGS: "false"
      TELEGRAM_GEO_LOGS: "false"
      MCP_TOKEN: "${XOMETRY_ANALIZA_MCP_TOKEN:-}"
      LOCAL_DOSAR_ROOT: "/mnt/xLucru"
      LOCAL_DOSAR_WINDOWS_ROOT: '\\192.168.2.6\d\00 COTATII IN LUCRU'
    ports:
      - "4468:4468"
    volumes:
      - xometryanaliza_data:/app/data
      - /mnt/xLucru:/mnt/xLucru

  xometry-app:
    image: ghcr.io/unraidg5/xometrystorageinformation:latest
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      PORT: "10000"
      DATABASE_URL: "${DATABASE_URL:-}"
      DOSAR_ROOT_PATH: "/mnt/xLucru"
      XOMETRY_AGENT_URL: "http://xometryanaliza:4468"
    volumes:
      - app_data:/app/data
      - app_images:/app/static/images
      - app_docs:/app/static/docs
      - app_devize:/app/static/devize
      - app_exports:/app/exports
      - /mnt/xLucru:/mnt/xLucru

  xometrybot-scraper:
    build:
      context: ./xometry_bot
    image: xometrybot-scraper:local
    restart: unless-stopped
    depends_on:
      - xometry-app
      - xometryanaliza
    environment:
      BOT_ENTRYPOINT: main.py
      BACKEND_URL: "http://xometry-app:10000"
      AGENT_URL: "http://xometryanaliza:4468"
      AGENT_PUBLIC_URL: "http://192.168.2.23:4468"
      AGENT_TIMEOUT: "10"
    env_file:
      - xometry_bot/.env
    volumes:
      - bot_data:/app/data

  xometrybot-telegram:
    build:
      context: ./xometry_bot
    image: xometrybot-telegram:local
    restart: unless-stopped
    depends_on:
      - xometry-app
      - xometrybot-scraper
      - xometryanaliza
    environment:
      BOT_ENTRYPOINT: bot_app.py
      BACKEND_URL: "http://xometry-app:10000"
      AGENT_URL: "http://xometryanaliza:4468"
      AGENT_PUBLIC_URL: "http://192.168.2.23:4468"
      AGENT_TIMEOUT: "10"
    env_file:
      - xometry_bot/.env
    volumes:
      - bot_data:/app/data

volumes:
  app_data:
  app_images:
  app_docs:
  app_devize:
  app_exports:
  bot_data:
  xometryanaliza_data:
