<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  
  <!-- Chart/analytics icon representing data analysis -->
  <g fill="white">
    <!-- Bar chart bars -->
    <rect x="6" y="20" width="3" height="8" rx="1"/>
    <rect x="10" y="16" width="3" height="12" rx="1"/>
    <rect x="14" y="12" width="3" height="16" rx="1"/>
    <rect x="18" y="18" width="3" height="10" rx="1"/>
    <rect x="22" y="14" width="3" height="14" rx="1"/>
    
    <!-- Trend line -->
    <path d="M6 24 L10 20 L14 16 L18 18 L22 14 L26 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Data points -->
    <circle cx="6" cy="24" r="1.5"/>
    <circle cx="10" cy="20" r="1.5"/>
    <circle cx="14" cy="16" r="1.5"/>
    <circle cx="18" cy="18" r="1.5"/>
    <circle cx="22" cy="14" r="1.5"/>
    <circle cx="26" cy="10" r="1.5"/>
  </g>
  
  <!-- Small "X" in corner representing Xometry -->
  <text x="24" y="8" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">X</text>
</svg>
