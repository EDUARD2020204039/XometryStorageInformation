<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istoric Comenzi - Xometry Analysis</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='/logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            height: 100vh;
            background-color: #343a40;
            padding-top: 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            color: white;
            z-index: 1000;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #d1d1d1;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            color: #f8f9fa;
            background-color: #495057;
        }

        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .extra-small {
            font-size: 0.72rem;
        }

        .btn-xs {
            padding: 2px 6px;
            font-size: 0.7rem;
        }

        .order-row:hover {
            background-color: #f1f3f5 !important;
        }

        th {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .table> :not(caption)>*>* {
            padding: 0.6rem 0.5rem;
        }

        .badge {
            font-weight: 400;
        }

        #orderSearch::placeholder {
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3 class="text-center mb-4">Xometry App</h3>
        <a href="/"><i class="fas fa-home me-2"></i> Oferte</a>
        <a href="/orders" class="active"><i class="fas fa-shopping-cart me-2"></i> Comenzi (PO)</a>
        <a href="/documentation"><i class="fas fa-book me-2"></i> Documentație</a>
        <a href="/help"><i class="fas fa-question-circle me-2"></i> Ajutor</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <img src="{{ url_for('static', path='/logo.png') }}" alt="Logo"
                    style="height: 50px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                <h2 class="mb-0">📦 Istoric Comenzi (PO)</h2>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <div id="resultsCount" class="badge bg-light text-dark border me-2" style="font-size: 0.9rem;">
                    Se încarcă...
                </div>
                <div class="input-group" style="width: 300px;">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="orderSearch" class="form-control border-start-0"
                        placeholder="Caută PO, Reper, Material...">
                </div>
                <button class="btn btn-outline-primary" onclick="window.location.reload()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div class="card p-0 overflow-hidden shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="ordersTable">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 80px;">Poză</th>
                            <th style="width: 180px;">PO / Reper</th>
                            <th style="width: 160px;">Material / Dim.</th>
                            <th style="width: 180px;">Procese</th>
                            <th style="width: 100px;">Status</th>
                            <th style="width: 110px;">Data</th>
                            <th style="width: 130px;">Preț</th>
                            <th style="width: 80px;" class="text-center">Link</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>

            <div id="loadMoreSection" class="p-4 text-center bg-light border-top">
                <button class="btn btn-primary px-4 shadow-sm" id="loadMoreBtn">
                    <i class="fas fa-plus me-2"></i> Încarcă mai multe
                </button>
                <div id="noMoreResults" class="text-muted d-none small">
                    <i class="fas fa-check-circle me-1"></i> Toate comenzile au fost încărcate.
                </div>
                <div id="loadingSpinner" class="spinner-border spinner-border-sm text-primary d-none" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="rawModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalii JSON Comandă</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <pre id="rawContent" class="bg-light p-3 rounded small"
                        style="max-height: 500px; overflow: auto;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentOffset = 0;
        const limit = 50;
        let currentQuery = '';
        let totalRecords = 0;
        let isLoading = false;

        const body = document.getElementById('ordersBody');
        const countEl = document.getElementById('resultsCount');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const noMoreResults = document.getElementById('noMoreResults');
        const spinner = document.getElementById('loadingSpinner');
        const searchInput = document.getElementById('orderSearch');
        const rawModal = new bootstrap.Modal(document.getElementById('rawModal'));
        const rawContent = document.getElementById('rawContent');

        async function fetchOrders(reset = false) {
            if (isLoading) return;
            isLoading = true;
            spinner.classList.remove('d-none');
            loadMoreBtn.classList.add('d-none');

            if (reset) {
                currentOffset = 0;
                body.innerHTML = '';
                noMoreResults.classList.add('d-none');
            }

            try {
                const url = `/api/orders?limit=${limit}&offset=${currentOffset}&q=${encodeURIComponent(currentQuery)}`;
                const res = await fetch(url);
                const data = await res.json();

                totalRecords = data.total;
                const orders = data.orders;

                if (orders.length === 0 && currentOffset === 0) {
                    body.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted"><i class="fas fa-search fa-2x mb-3 opacity-25"></i><br>Nu am găsit rezultate.</td></tr>';
                } else {
                    renderRows(orders);
                    currentOffset += orders.length;

                    if (currentOffset >= totalRecords) {
                        loadMoreBtn.classList.add('d-none');
                        noMoreResults.classList.remove('d-none');
                    } else {
                        loadMoreBtn.classList.remove('d-none');
                    }
                }

                const totalOrders = data.total_orders ?? totalRecords;
                const totalRows = data.total_rows ?? totalRecords;
                countEl.textContent = `Afișate ${currentOffset} repere din ${totalRows} · ${totalOrders} PO-uri`;
            } catch (e) {
                console.error("Fetch error:", e);
                countEl.textContent = "Eroare la încărcare";
                loadMoreBtn.classList.remove('d-none');
            } finally {
                isLoading = false;
                spinner.classList.add('d-none');
            }
        }

        function renderRows(orders) {
            orders.forEach(o => {
                const details = o.details || {};
                const tr = document.createElement('tr');
                tr.className = 'order-row';

                let priceVal = o.price;
                if (!priceVal || priceVal === 'null' || priceVal === '-') {
                    priceVal = details.price_unit || details.price_total || details.Price || '-';
                }

                let badgeClass = 'bg-light text-dark border';
                const st = (o.status || '').toLowerCase();
                if (st.includes('open') || st.includes('paid') || st.includes('succes') || st.includes('finalizat')) badgeClass = 'bg-success';
                else if (st.includes('shipp') || st.includes('trimis')) badgeClass = 'bg-primary';
                else if (st.includes('cancel') || st.includes('anulat')) badgeClass = 'bg-danger';

                const imgUrl = o.local_image ? `/static/${o.local_image}` : (details.Image || details.image_url || details.image || '');
                const imgHtml = imgUrl
                    ? `<img src="${imgUrl}" class="rounded border shadow-sm" style="width: 60px; height: 50px; object-fit: cover;" onerror="this.src='https://placehold.co/60x50?text=Fara+Foto'">`
                    : `<div class="bg-light border rounded d-flex align-items-center justify-content-center text-muted" style="width: 60px; height: 50px;"><i class="fas fa-image opacity-25"></i></div>`;

                const procRaw = details.processes || '';
                const procBadges = procRaw
                    ? procRaw.split(',').map(p => `<span class="badge bg-light text-dark border extra-small me-1 mb-1 shadow-xs">${p.trim()}</span>`).join('')
                    : '-';

                // Robust handling of Dim/Mat (prevent [object Object])
                const fmt = (v) => {
                    if (!v) return '-';
                    if (typeof v === 'object') {
                        // Handle the dimensions object {length, width, height, unit}
                        if (v.length && v.width) {
                            let s = `${v.length} × ${v.width}`;
                            if (v.height) s += ` × ${v.height}`;
                            if (v.unit) s += ` ${v.unit}`;
                            return s;
                        }
                        return v.text || v.value || JSON.stringify(v);
                    }
                    return String(v);
                };

                const mat = fmt(details.material);
                const dim = fmt(details.dimensions);
                const partName = details.part_name || '-';
                const quantity = details.quantity || '-';

                tr.innerHTML = `
                    <td class="text-center">${imgHtml}</td>
                    <td>
                        <div class="fw-bold text-primary small mb-1">${o.order_id || 'N/A'}</div>
                        <div class="text-truncate-2 small text-dark fw-bold" style="max-height: 2.8em; line-height: 1.2; overflow: hidden;" title="${partName}">
                            ${partName}
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <span class="text-muted extra-small" style="font-size: 0.65rem;">ID: ${o.part_id || '-'}</span>
                            <span class="badge bg-light text-secondary border extra-small" style="font-size: 0.65rem;">Cant: ${quantity}</span>
                        </div>
                    </td>
                    <td style="line-height: 1.3;">
                        <div class="small text-truncate" style="max-width: 150px;" title="${mat}">${mat}</div>
                        <div class="extra-small text-muted text-truncate" style="max-width: 150px;" title="${dim}">${dim}</div>
                    </td>
                    <td>
                        <div style="display: flex; flex-wrap: wrap; max-width: 180px;">
                            ${procBadges}
                        </div>
                    </td>
                    <td><span class="badge ${badgeClass} small" style="font-weight: 500;">${o.status || '-'}</span></td>
                    <td class="small text-muted" style="white-space: nowrap;">${o.order_date || '-'}</td>
                    <td class="fw-bold text-dark small">${priceVal}</td>
                    <td class="text-center">
                        <div class="d-flex flex-column gap-1">
                            ${(details.link || details.order_url) ? `<a href="${details.link || details.order_url}" target="_blank" class="btn btn-xs btn-outline-primary" title="Xometry Portal"><i class="fas fa-external-link-alt"></i></a>` : ''}
                            <button class="btn btn-xs btn-outline-secondary info-btn" title="Date JSON"><i class="fas fa-code"></i></button>
                        </div>
                    </td>
                `;

                const btn = tr.querySelector('.info-btn');
                btn.onclick = () => {
                    rawContent.textContent = JSON.stringify(o, null, 2);
                    rawModal.show();
                };

                body.appendChild(tr);
            });
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentQuery = e.target.value;
                fetchOrders(true);
            }, 400);
        });

        loadMoreBtn.addEventListener('click', () => fetchOrders());
        window.addEventListener('DOMContentLoaded', () => fetchOrders());
    </script>
</body>

</html>
